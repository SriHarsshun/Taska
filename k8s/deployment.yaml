apiVersion: apps/v1
kind: Deployment
metadata:
  name: taska-deployment
  labels:
    app: taska
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taska
  template:
    metadata:
      labels:
        app: taska
    spec:
      containers:
        - name: taska
          image: sriharsshun/taska:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
